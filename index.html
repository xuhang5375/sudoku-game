<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数独小游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(145deg, #f1f8e9, #dcedc8, #c5e1a5);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #33691e;
    padding: 20px;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }
  .subtitle { font-size: 0.85rem; color: #689f38; margin-bottom: 20px; }

  .info-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }
  .info-bar span { color: #558b2f; }
  .info-bar strong { color: #2e7d32; }

  #board {
    border-collapse: collapse;
    border: 3px solid #388e3c;
    background: rgba(255,255,255,0.75);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(46,125,50,0.15);
  }
  #board td {
    width: 50px;
    height: 50px;
    text-align: center;
    vertical-align: middle;
    border: 1px solid rgba(76,175,80,0.35);
    font-size: 1.4rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
    background: transparent;
  }
  /* 3x3 block borders — thicker & darker */
  /* 每个格子根据所在宫格附加独立边框 */
  /* 右粗边：宫的最后一列（c=2,5） */
  .blk-r { border-right: 3px solid #1b5e20 !important; }
  /* 下粗边：宫的最后一列（r=2,5） */
  .blk-b { border-bottom: 3px solid #1b5e20 !important; }

  /* 选中格子 */
  #board td.selected {
    background: rgba(76,175,80,0.88) !important;
    box-shadow: inset 0 0 0 2.5px #1b5e20;
    z-index: 2;
  }
  /* 同行 */
  #board td.hl-row {
    background: rgba(76,175,80,0.40) !important;
  }
  /* 同列 */
  #board td.hl-col {
    background: rgba(76,175,80,0.40) !important;
  }
  /* 同9宫格（不是同行同列） */
  #board td.hl-block {
    background: rgba(76,175,80,0.28) !important;
  }
  /* 同行且同列（十字交叉处）叠加 */
  #board td.hl-row.hl-col {
    background: rgba(76,175,80,0.62) !important;
  }
  /* 同行且同9宫格 */
  #board td.hl-row.hl-block {
    background: rgba(76,175,80,0.54) !important;
  }
  /* 同列且同9宫格 */
  #board td.hl-col.hl-block {
    background: rgba(76,175,80,0.54) !important;
  }
  /* 三者重叠 */
  #board td.hl-row.hl-col.hl-block {
    background: rgba(76,175,80,0.75) !important;
  }
  /* 选中时覆盖hover */
  #board td.selected.hl-row,
  #board td.selected.hl-col,
  #board td.selected.hl-block,
  #board td.selected.hl-row.hl-col,
  #board td.selected.hl-row.hl-block,
  #board td.selected.hl-col.hl-block,
  #board td.selected.hl-row.hl-col.hl-block {
    background: rgba(76,175,80,0.88) !important;
  }

  /* 给定数字（原始题目） */
  #board td.fixed {
    color: #1b5e20;
    background: transparent;
    cursor: default;
    font-weight: 700;
  }
  /* 用户填入的数字 */
  #board td.filled {
    color: #33691e;
    background: transparent;
    font-weight: 600;
  }
  /* 填入正确数字高亮 */
  #board td.filled.correct {
    color: #1b5e20;
  }
  /* 同数字 */
  #board td.same-num {
    background: rgba(76,175,80,0.22) !important;
  }
  /* 冲突格子 */
  #board td.error-cell {
    color: #c62828 !important;
    background: rgba(255,82,82,0.18) !important;
  }
  /* 通关动画 */
  #board td.success-cell {
    color: #2e7d32;
    animation: pop 0.3s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 6px;
    margin-top: 20px;
    max-width: 462px;
    width: 100%;
  }
  .numpad button {
    padding: 10px 0;
    font-size: 1.2rem;
    background: rgba(255,255,255,0.8);
    color: #33691e;
    border: 1px solid rgba(76,175,80,0.4);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .numpad button:hover {
    background: #e8f5e9;
    border-color: #388e3c;
    color: #1b5e20;
    transform: scale(1.05);
  }
  .numpad button:active { transform: scale(0.95); }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .actions button {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid rgba(76,175,80,0.4);
    background: rgba(255,255,255,0.7);
    color: #33691e;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .actions button:hover {
    border-color: #388e3c;
    color: #1b5e20;
    background: #e8f5e9;
  }
  .actions button.primary {
    background: #388e3c;
    color: white;
    border-color: #388e3c;
  }
  .actions button.primary:hover { background: #2e7d32; }

  .msg {
    margin-top: 14px;
    font-size: 0.95rem;
    height: 22px;
    color: #2e7d32;
    text-align: center;
    transition: all 0.3s;
  }
  .msg.error { color: #c62828; }

  /* 通关弹窗 */
  #win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(4px);
  }
  .win-card {
    background: linear-gradient(145deg, #f1f8e9, #e8f5e9);
    border: 3px solid #388e3c;
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: win-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 2;
  }
  @keyframes win-pop {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .confetti-row {
    font-size: 1.8rem;
    margin: 8px 0;
    letter-spacing: 6px;
  }
  .win-title {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    margin: 10px 0;
  }
  .win-sub {
    font-size: 1.3rem;
    color: #33691e;
    margin: 10px 0 20px;
  }
  .win-btn {
    padding: 12px 36px;
    font-size: 1.1rem;
    background: #388e3c;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(56,142,60,0.4);
  }
  .win-btn:hover { background: #2e7d32; transform: scale(1.05); }
  .win-btn:active { transform: scale(0.95); }

  /* 彩纸 */
  .confetti-piece {
    position: fixed;
    top: -40px;
    animation: confetti-fall linear forwards;
    pointer-events: none;
    z-index: 1000;
    user-select: none;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .difficulty-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .difficulty-wrap span { font-size: 0.85rem; color: #558b2f; }
  .diff-btn {
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid rgba(76,175,80,0.4);
    background: rgba(255,255,255,0.7);
    color: #33691e;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .diff-btn.active {
    border-color: #388e3c;
    color: #1b5e20;
    background: rgba(76,175,80,0.15);
    font-weight: 600;
  }
  .diff-btn:hover { border-color: #388e3c; color: #1b5e20; }

  @media (max-width: 520px) {
    #board td { width: 38px; height: 38px; font-size: 1.1rem; }
    .numpad { max-width: 360px; }
    .numpad button { padding: 8px 0; font-size: 1rem; }
  }
</style>
</head>
<body>

<h1>数  独</h1>
<p class="subtitle">点击格子 → 选数字填入</p>

<div class="difficulty-wrap">
  <span>难度：</span>
  <button class="diff-btn active" data-diff="medium">中等</button>
  <button class="diff-btn" data-diff="hard">困难</button>
</div>

<div class="info-bar">
  <span>⏱ <strong id="timer">00:00</strong></span>
  <span>❌ <strong id="errors">0</strong> / 3</span>
</div>

<table id="board"></table>

<div class="numpad" id="numpad"></div>

<div class="actions">
  <button class="primary" id="btn-new">新游戏</button>
  <button id="btn-hint">提示</button>
  <button id="btn-clear">清空</button>
</div>

<p class="msg" id="msg"></p>

<script>
const DIFFICULTY_HOLES = { easy: 35, medium: 45, hard: 55 };
let board = [], solution = [], fixed = [], selected = null;
let errorCount = 0, startTime = null, timerInterval = null;
let difficulty = 'medium';
// 交互状态：标记是否处于"同数字再次点击"模式
let repeatMode = false;

function init() {
  buildNumpad();
  newGame();
  bindDiffButtons();
  document.getElementById('btn-new').onclick = newGame;
  document.getElementById('btn-hint').onclick = giveHint;
  document.getElementById('btn-clear').onclick = clearSelected;
  document.getElementById('board').addEventListener('mousemove', handleBoardHover);
  document.getElementById('board').addEventListener('mouseleave', clearHoverHL);
}

function buildNumpad() {
  const np = document.getElementById('numpad');
  np.innerHTML = '';
  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.onclick = () => fillNumber(i);
    np.appendChild(btn);
  }
  const clr = document.createElement('button');
  clr.textContent = '✕';
  clr.style.color = '#c62828';
  clr.onclick = () => fillNumber(0);
  np.appendChild(clr);
}

function bindDiffButtons() {
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
      newGame();
    };
  });
}

function newGame() {
  errorCount = 0;
  document.getElementById('errors').textContent = '0';
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'msg';
  clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();

  solution = generateSolution();
  board = solution.map(r => [...r]);
  const holes = DIFFICULTY_HOLES[difficulty];
  const positions = [];
  for (let i = 0; i < 81; i++) positions.push(i);
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }
  for (let k = 0; k < holes && k < positions.length; k++) {
    const idx = positions[k];
    board[Math.floor(idx / 9)][idx % 9] = 0;
  }
  fixed = board.map(row => row.map(v => v !== 0));
  selected = null;
  render();
}

function generateSolution() {
  const base = [
    [1,2,3,4,5,6,7,8,9],
    [4,5,6,7,8,9,1,2,3],
    [7,8,9,1,2,3,4,5,6],
    [2,3,1,5,6,4,8,9,7],
    [5,6,4,8,9,7,2,3,1],
    [8,9,7,2,3,1,5,6,4],
    [3,1,2,6,7,5,9,4,8],
    [6,7,8,9,1,2,3,4,5],
    [9,4,5,3,6,8,7,1,2]
  ];
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }
  function swapRows(m) {
    for (let g = 0; g < 3; g++) {
      const block = g * 3;
      const r1 = block + Math.floor(Math.random() * 3);
      let r2 = block + Math.floor(Math.random() * 3);
      while (r2 === r1) r2 = block + Math.floor(Math.random() * 3);
      [m[r1], m[r2]] = [m[r2], m[r1]];
    }
    return m;
  }
  function swapCols(m) {
    for (let g = 0; g < 3; g++) {
      const block = g * 3;
      const c1 = block + Math.floor(Math.random() * 3);
      let c2 = block + Math.floor(Math.random() * 3);
      while (c2 === c1) c2 = block + Math.floor(Math.random() * 3);
      for (let r = 0; r < 9; r++) [m[r][c1], m[r][c2]] = [m[r][c2], m[r][c1]];
    }
    return m;
  }
  let m = base.map(r => [...r]);
  const nums = [1,2,3,4,5,6,7,8,9]; shuffle(nums);
  m = m.map(row => row.map(v => nums[v - 1]));
  swapRows(m); swapCols(m);
  m = m[0].map((_, i) => m.map(r => r[i]));
  swapRows(m); swapCols(m);
  return m;
}

// hover 高亮逻辑：行 + 列 + 9宫格
function getBlock(r, c) {
  return { br: Math.floor(r / 3) * 3, bc: Math.floor(c / 3) * 3 };
}

function applyHoverHL(r, c) {
  clearHoverHL();
  const { br, bc } = getBlock(r, c);
  const table = document.getElementById('board');
  const rows = table.querySelectorAll('tr');

  for (let rowIdx = 0; rowIdx < 9; rowIdx++) {
    const tds = rows[rowIdx].children;
    for (let colIdx = 0; colIdx < 9; colIdx++) {
      const td = tds[colIdx];
      const inRow = (rowIdx === r);
      const inCol = (colIdx === c);
      const inBlock = (rowIdx >= br && rowIdx < br + 3 && colIdx >= bc && colIdx < bc + 3);

      if (inRow) td.classList.add('hl-row');
      if (inCol) td.classList.add('hl-col');
      // 悬停时始终显示宫格高亮（独立于交互模式）
      if (inBlock) td.classList.add('hl-block');
    }
  }
}

function clearHoverHL() {
  document.querySelectorAll('.hl-row, .hl-col, .hl-block')
    .forEach(t => { t.classList.remove('hl-row', 'hl-col', 'hl-block'); });
}

function handleBoardHover(e) {
  const td = e.target.closest('td');
  if (!td) return;
  const r = parseInt(td.dataset.r), c = parseInt(td.dataset.c);
  applyHoverHL(r, c);
}

function render() {
  clearHoverHL();
  const table = document.getElementById('board');
  table.innerHTML = '';

  for (let r = 0; r < 9; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < 9; c++) {
      const td = document.createElement('td');
      td.dataset.r = r;
      td.dataset.c = c;

      if (board[r][c] !== 0) {
        td.textContent = board[r][c];
      }

      if (fixed[r][c]) {
        td.classList.add('fixed');
      } else {
        td.classList.add('filled');
        if (board[r][c] !== 0) td.classList.add('correct');
      }

      // ─── 9宫格独立边框标记 ───
      const cInBlock = c % 3;
      const rInBlock = r % 3;
      if (cInBlock === 2) td.classList.add('blk-r');  // 宫右边界
      if (rInBlock === 2) td.classList.add('blk-b');  // 宫下边界

      // ─── 选中格联动高亮 ───
      if (selected && selected.r === r && selected.c === c) {
        td.classList.add('selected');
      } else if (selected && board[r][c] !== 0) {
        // 同行
        if (r === selected.r) td.classList.add('hl-row');
        // 同列
        if (c === selected.c) td.classList.add('hl-col');
        // 同宫（仅在非同数字再次点击模式时）
        if (!repeatMode) {
          const { br, bc } = getBlock(selected.r, selected.c);
          if (r >= br && r < br + 3 && c >= bc && c < bc + 3) {
            td.classList.add('hl-block');
          }
        }
        // 其他同数字格子（在非repeatMode时额外显示）
        if (!repeatMode && board[r][c] === board[selected.r][selected.c]) {
          td.classList.add('same-num');
        }
      }

      td.onclick = () => {
        const clickedNum = board[r][c];
        // 判断是否为"同数字再次点击"：已有选中、且数字相同、且不是同一个格子
        if (selected && clickedNum !== 0 &&
            clickedNum === board[selected.r][selected.c] &&
            !(selected.r === r && selected.c === c)) {
          repeatMode = true;
        } else {
          repeatMode = false;
        }
        selected = { r, c };
        render();
      };

      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
}

function fillNumber(n) {
  if (!selected) return;
  const { r, c } = selected;
  if (fixed[r][c]) return;

  // 清除旧冲突标记
  document.querySelectorAll('.error-cell').forEach(t => t.classList.remove('error-cell'));

  if (n === 0) {
    board[r][c] = 0;
    render();
    return;
  }

  // 冲突检测
  for (let i = 0; i < 9; i++) {
    if (i !== c && board[r][i] === n) { markError(); return; }
    if (i !== r && board[i][c] === n) { markError(); return; }
  }
  const { br, bc } = getBlock(r, c);
  for (let i = br; i < br + 3; i++)
    for (let j = bc; j < bc + 3; j++)
      if (!(i === r && j === c) && board[i][j] === n) { markError(); return; }

  board[r][c] = n;
  render();

  if (checkWin()) showWin();
}

function markError() {
  errorCount++;
  document.getElementById('errors').textContent = errorCount;
  const msg = document.getElementById('msg');
  msg.textContent = '❌ 数字冲突，请重试！';
  msg.className = 'msg error';
  setTimeout(() => {
    msg.textContent = '';
    msg.className = 'msg';
    document.querySelectorAll('.error-cell').forEach(t => t.classList.remove('error-cell'));
  }, 2000);
}

function clearSelected() {
  if (!selected || fixed[selected.r][selected.c]) return;
  board[selected.r][selected.c] = 0;
  render();
}

function giveHint() {
  const empty = [];
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++)
      if (board[r][c] === 0) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = solution[r][c];
  fixed[r][c] = true;
  selected = { r, c };
  render();
  if (checkWin()) showWin();
}

function checkWin() {
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++)
      if (board[r][c] !== solution[r][c]) return false;
  return true;
}

function showWin() {
  clearInterval(timerInterval);
  const elapsed = document.getElementById('timer').textContent;

  // 弹出大标题
  const overlay = document.createElement('div');
  overlay.id = 'win-overlay';
  overlay.innerHTML = `
    <div class="win-card">
      <div class="confetti-row">🎊 🎉 🎊 🎉 🎊 🎉 🎊</div>
      <div class="win-title">🎉 通关！🎉</div>
      <div class="win-sub">用时：${elapsed}</div>
      <div class="confetti-row">🎊 🎉 🎊 🎉 🎊 🎉 🎊</div>
      <button class="win-btn" onclick="document.getElementById('win-overlay').remove(); this.closest('#win-overlay').querySelector('.win-card').style.animation='none'">再玩一局</button>
    </div>
  `;
  document.body.appendChild(overlay);

  // 点击按钮触发新游戏
  overlay.querySelector('.win-btn').addEventListener('click', () => {
    overlay.remove();
    newGame();
  });

  // 彩纸下落动画
  spawnConfetti();

  document.querySelectorAll('#board td').forEach(td => td.classList.add('success-cell'));
}

function spawnConfetti() {
  const emojis = ['🎊','🎉','🌟','✨','🎈','🍀','🌸','💚'];
  const container = document.getElementById('win-overlay');
  if (!container) return;
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.fontSize = (16 + Math.random() * 20) + 'px';
    el.style.opacity = 0.7 + Math.random() * 0.3;
    container.appendChild(el);
  }
  // 自动清理
  setTimeout(() => {
    document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
  }, 6000);
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

init();
</script>
</body>
</html>
